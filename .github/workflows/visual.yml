name: visual
on:
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # The harness server (tests/visual/harness/server.mjs) serves
      # packages/viewer/dist; it must exist before playwright starts.
      - run: pnpm -F @splatforge/viewer run build
      # Chromium-only to keep CI cheap. Firefox/WebKit + chrome-webgpu
      # (which needs --enable-unsafe-webgpu + swiftshader) are not run in CI;
      # they remain available for local `make install-playwright` runs.
      - run: pnpm -F splatforge-visual exec playwright install --with-deps chromium
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p splatforge-cli
      - run: pnpm -F splatforge-visual exec playwright test --project=chrome-webgl2
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-report
          path: tests/visual/report/
