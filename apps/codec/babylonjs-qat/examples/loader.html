<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>@splatforge/babylonjs-qat — QAT-PLY loader demo</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; color: #eee; font-family: system-ui; }
    #c { width: 100vw; height: 100vh; display: block; touch-action: none; outline: none; }
    #status {
      position: fixed; top: 8px; left: 8px; background: rgba(0,0,0,0.6);
      padding: 6px 10px; border-radius: 4px; font-size: 12px;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="status">loading…</div>
  <script type="module">
    import * as BABYLON from "https://cdn.jsdelivr.net/npm/@babylonjs/core@7/+esm";
    // In an installed project: import { QATPlyLoader } from "@splatforge/babylonjs-qat";
    import { QATPlyLoader } from "../dist/esm/index.js";

    const canvas = document.getElementById("c");
    const status = document.getElementById("status");
    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true });
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.07, 0.07, 0.07, 1);
    const camera = new BABYLON.ArcRotateCamera(
      "cam", Math.PI / 4, Math.PI / 3, 5, BABYLON.Vector3.Zero(), scene,
    );
    camera.attachControl(canvas, true);

    const params = new URLSearchParams(location.search);
    const src = params.get("src");
    const loader = new QATPlyLoader();
    try {
      let buf;
      if (src) {
        status.textContent = `fetching ${src}…`;
        buf = new Uint8Array(await (await fetch(src)).arrayBuffer());
      } else {
        status.textContent = "no ?src= URL — rendering a synthetic 256-point demo.";
        buf = synthesizeDemoPly();
      }
      const mesh = await loader.loadIntoScene(scene, buf, "splats");
      mesh.isPickable = false;
      status.textContent = `loaded ${loader.parse(buf).vertexCount} anchors`;
    } catch (err) {
      console.error(err);
      status.textContent = `error: ${err.message}`;
    }

    engine.runRenderLoop(() => scene.render());
    addEventListener("resize", () => engine.resize());

    function synthesizeDemoPly() {
      const N = 256;
      const header =
        "ply\nformat binary_little_endian 1.0\n" +
        "comment constant_field nx 0x0.0p+0\n" +
        "comment constant_field ny 0x0.0p+0\n" +
        "comment constant_field nz 0x0.0p+0\n" +
        `element vertex ${N}\n` +
        "property float x\nproperty float y\nproperty float z\n" +
        "property float f_dc_0\nproperty float f_dc_1\nproperty float f_dc_2\n" +
        "end_header\n";
      const headerBytes = new TextEncoder().encode(header);
      const rowStride = 24;
      const body = new Uint8Array(rowStride * N);
      const view = new DataView(body.buffer);
      for (let i = 0; i < N; i++) {
        const t = i / N;
        const a = t * Math.PI * 4;
        const r = 1.5 + 0.5 * Math.cos(a * 3);
        view.setFloat32(i * rowStride + 0, r * Math.cos(a), true);
        view.setFloat32(i * rowStride + 4, Math.sin(t * Math.PI * 2), true);
        view.setFloat32(i * rowStride + 8, r * Math.sin(a), true);
        view.setFloat32(i * rowStride + 12, Math.cos(a) * 1.5, true);
        view.setFloat32(i * rowStride + 16, Math.sin(a * 1.7) * 1.5, true);
        view.setFloat32(i * rowStride + 20, Math.sin(a * 0.5) * 1.5, true);
      }
      const out = new Uint8Array(headerBytes.byteLength + body.byteLength);
      out.set(headerBytes, 0);
      out.set(body, headerBytes.byteLength);
      return out;
    }
  </script>
</body>
</html>
