# cbindgen config — run via scripts/regen-headers.sh.
# Produces ios/Sources/CatetusViewerC/include/catetus_viewer_mobile.h
language = "C"
header = "/* Auto-generated by cbindgen — DO NOT EDIT. */"
include_guard = "CATETUS_VIEWER_MOBILE_H"
pragma_once = true
autogen_warning = "/* WARNING: regenerate with scripts/regen-headers.sh */"
no_includes = false
sys_includes = ["stddef.h", "stdint.h"]
documentation = true
documentation_style = "doxy"

[export]
prefix = ""
include = ["SfmvStatus", "SfmvBuffer"]

[parse]
parse_deps = false
